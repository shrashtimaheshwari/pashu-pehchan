<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Head - longer, more rectangular bovine shape -->
  <ellipse cx="100" cy="115" rx="65" ry="70" fill="#F5E6D3" stroke="#6B4423" stroke-width="2"/>
  
  <!-- Ears - tall and pointed like a cow -->
  <ellipse cx="45" cy="55" rx="16" ry="40" fill="#F5E6D3" stroke="#6B4423" stroke-width="2" transform="rotate(-25 45 55)"/>
  <ellipse cx="155" cy="55" rx="16" ry="40" fill="#F5E6D3" stroke="#6B4423" stroke-width="2" transform="rotate(25 155 55)"/>
  
  <!-- Ear inner - pink -->
  <ellipse cx="45" cy="55" rx="8" ry="25" fill="#FFB6C1" transform="rotate(-25 45 55)"/>
  <ellipse cx="155" cy="55" rx="8" ry="25" fill="#FFB6C1" transform="rotate(25 155 55)"/>
  
  <!-- Horns - curved cow horns -->
  <path d="M 50 45 Q 35 35 38 15" stroke="#6B4423" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 150 45 Q 165 35 162 15" stroke="#6B4423" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Large black spots on face -->
  <ellipse cx="65" cy="95" rx="18" ry="22" fill="#4A2511" opacity="0.7"/>
  <ellipse cx="135" cy="95" rx="18" ry="22" fill="#4A2511" opacity="0.7"/>
  <ellipse cx="100" cy="140" rx="20" ry="15" fill="#4A2511" opacity="0.6"/>
  
  <!-- White face marking area -->
  <ellipse cx="100" cy="105" rx="35" ry="40" fill="#FFFACD" opacity="0.8"/>
  
  <!-- Eyes -->
  <circle cx="78" cy="90" r="7" fill="black"/>
  <circle cx="122" cy="90" r="7" fill="black"/>
  <circle cx="79.5" cy="88" r="2.5" fill="white"/>
  <circle cx="123.5" cy="88" r="2.5" fill="white"/>
  
  <!-- Snout/muzzle - pink -->
  <ellipse cx="100" cy="130" rx="28" ry="22" fill="#FFD9B3" stroke="#6B4423" stroke-width="1.5"/>
  
  <!-- Nostrils - wide set like a cow -->
  <ellipse cx="85" cy="130" rx="5" ry="6" fill="#6B4423"/>
  <ellipse cx="115" cy="130" rx="5" ry="6" fill="#6B4423"/>
  
  <!-- Mouth line -->
  <path d="M 100 130 L 100 145" stroke="#6B4423" stroke-width="2" stroke-linecap="round"/>
</svg>